name: Make PNG

on:
  workflow_dispatch:
    inputs:
      size:
        description: "Output size in px"
        required: true
        default: "3000"
      background:
        description: "Background hex color. Leave empty for transparent."
        required: false
        default: ""

jobs:
  make-png:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate transparent PNGs
        if: ${{ inputs.background == '' }}
        run: python make_png.py "${{ inputs.size }}"

      - name: Generate PNGs with background
        if: ${{ inputs.background != '' }}
        run: python make_png.py "${{ inputs.size }}" "${{ inputs.background }}"

      - name: Set artifact metadata
        id: meta
        shell: bash
        run: |
          if [ -z "${{ inputs.background }}" ]; then
            echo "name=png-${{ inputs.size }}" >> "$GITHUB_OUTPUT"
            echo "path=out_${{ inputs.size }}/" >> "$GITHUB_OUTPUT"
          else
            background="${{ inputs.background }}"
            background="${background#\#}"
            echo "name=png-${{ inputs.size }}-${background}" >> "$GITHUB_OUTPUT"
            echo "path=out_${{ inputs.size }}_${background}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload PNG artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.name }}
          path: ${{ steps.meta.outputs.path }}
